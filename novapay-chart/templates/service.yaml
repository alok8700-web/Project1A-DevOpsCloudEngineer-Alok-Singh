apiVersion: v1
kind: Service

metadata:
  name: {{ include "novapay-chart.fullname" . }}
  labels:
    app.kubernetes.io/name: novapay-chart

spec:
  type: LoadBalancer

  selector:
    app.kubernetes.io/name: novapay-chart

  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: 8080
