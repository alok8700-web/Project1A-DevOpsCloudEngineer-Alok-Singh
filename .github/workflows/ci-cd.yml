name: CI-CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
        
      - name: Configure Maven Settings
        run: |
          mkdir -p ~/.m2

          cat > ~/.m2/settings.xml <<EOF
          <settings>
            <servers>
              <server>
                <id>nexus</id>
                <username>${{ secrets.NEXUS_USERNAME }}</username>
                <password>${{ secrets.NEXUS_PASSWORD }}</password>
              </server>
            </servers>
          </settings>
          EOF
    

      - name: SonarQube Scan
        run: |
          cd app
          mvn sonar:sonar \
          -Dsonar.projectKey=novapay \
          -Dsonar.host.url=${{ secrets.SONAR_HOST_URL }} \
          -Dsonar.login=${{ secrets.SONAR_TOKEN }}

      - name: Build and Publish JAR to Nexus
        run: |
          cd app
          mvn clean deploy    

      - name: Build Docker Image
        run: |
          docker build --no-cache -t alokdocker8700/novapay-app:${{ github.sha }} ./app
      
      - name: Run Trivy Vulnerability Scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'alokdocker8700/novapay-app:${{ github.sha }}'
          format: 'table'
          exit-code: '0'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'

      - name: Push Docker Image
        run: |
          docker push alokdocker8700/novapay-app:${{ github.sha }}

      - name: Update Helm values.yaml
        run: |
          sed -i 's/tag:.*/tag: "${{ github.sha }}"/' novapay-chart/values.yaml

      - name: Commit Updated Helm Chart
        run: |
          git config --global user.email "github-actions@github.com"
          git config --global user.name "github-actions"

          git add novapay-chart/values.yaml
          git commit -m "Update image tag to ${{ github.sha }}" || echo "No changes"

          git push


