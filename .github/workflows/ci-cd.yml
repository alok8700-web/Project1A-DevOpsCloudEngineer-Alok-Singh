name: CI-CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker Image
        run: |
          docker build -t alokdocker8700/novapay-app:${{ github.sha }} ./app

      - name: Push Docker Image
        run: |
          docker push alokdocker8700/novapay-app:${{ github.sha }}

      - name: Update Helm values.yaml
        run: |
          sed -i 's/tag:.*/tag: "${{ github.sha }}"/' novapay-chart/values.yaml

      - name: Commit Updated Helm Chart
        run: |
          git config --global user.email "github-actions@github.com"
          git config --global user.name "github-actions"

          git add novapay-chart/values.yaml
          git commit -m "Update image tag to ${{ github.sha }}" || echo "No changes"

          git push
