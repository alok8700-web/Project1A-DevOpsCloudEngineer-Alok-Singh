apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: novapay-monitor
  namespace: monitoring
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: novapay-chart
  namespaceSelector:
    matchNames:
      - default
  endpoints:
    - port: http
      path: /actuator/prometheus
      interval: 15s
